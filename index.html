<!--
  Cover page: a ChatGPT-cloned single-page app.
  All real functionality is gated behind Konami + PIN + hotspot hover.
  See SPEC.md for design.
-->
<!DOCTYPE html>
<html lang="en" data-theme="dark" data-app-state="cover">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>ChatGPT</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23000'/%3E%3Cpath d='M16 8l5 3v6l-5 3-5-3v-6z' fill='none' stroke='%23fff' stroke-width='1.5'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="icon-btn sidebar-toggle" id="sidebar-toggle" title="Close sidebar">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <button class="icon-btn new-chat-btn" id="new-chat-btn" title="New chat">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="m18.5 2.5 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
      </div>
      <div class="sidebar-search">
        <button class="sidebar-link">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>Search chats</span>
        </button>
        <button class="sidebar-link">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Library</span>
        </button>
      </div>
      <div class="chat-list-header">Chats</div>
      <nav class="chat-list" id="chat-list" aria-label="Chat history"></nav>
      <div class="sidebar-bottom">
        <button class="user-pill" id="user-pill">
          <span class="avatar">U</span>
          <span class="user-name">User</span>
        </button>
      </div>
    </aside>

    <!-- MAIN PANE -->
    <main class="main" id="main">
      <header class="top-bar">
        <button class="model-picker safe-zone" id="model-picker" data-safe-zone>
          <span class="model-label">
            <span id="current-model-label">ChatGPT 4o</span>
          </span>
          <svg class="chev" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="top-bar-right">
          <button class="icon-btn" title="Share"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
        </div>
      </header>

      <section class="messages-wrap" id="messages-wrap">
        <div class="messages" id="messages"></div>
        <div class="empty-state" id="empty-state">
          <h1 id="empty-greeting">What's on your mind today?</h1>
        </div>
      </section>

      <footer class="composer-wrap">
        <!-- Invisible hotspot to the LEFT of the composer. Hovering keeps app unlocked. -->
        <div class="hotspot safe-zone" id="hotspot" data-safe-zone aria-hidden="true"></div>

        <div class="composer">
          <button class="composer-icon" id="attach-btn" title="Attach">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <textarea
            id="composer-input"
            placeholder="Ask anything"
            rows="1"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            data-form-type="other"
            data-1p-ignore
            data-lpignore="true"
          ></textarea>
          <div class="composer-icons">
            <button class="composer-icon" title="Tools">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </button>
            <button class="composer-icon" title="Voice">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button class="send-btn safe-zone" id="send-btn" data-safe-zone aria-label="Send">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </div>
        </div>
        <div class="composer-foot" id="composer-foot">ChatGPT can make mistakes. Check important info.</div>
      </footer>

      <!-- Model picker dropdown -->
      <div class="model-dropdown hidden" id="model-dropdown" role="listbox"></div>
    </main>
  </div>

  <!-- PIN modal, themed as "Custom Instructions" -->
  <div class="modal-overlay hidden" id="pin-modal" role="dialog" aria-modal="true">
    <div class="modal">
      <header class="modal-header">
        <h2>Custom Instructions</h2>
        <button class="modal-close" id="pin-cancel" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </header>
      <div class="modal-body">
        <label class="modal-label">What would you like ChatGPT to know about you to provide better responses?</label>
        <input
          type="password"
          id="pin-input"
          class="modal-input"
          placeholder="Your custom instructions..."
          autocomplete="off"
          spellcheck="false"
          data-form-type="other"
        >
        <div class="modal-hint" id="pin-hint">Press Enter to save</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="pin-cancel-2">Cancel</button>
        <button class="btn btn-primary" id="pin-ok">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
