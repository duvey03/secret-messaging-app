# Cloudflare Worker config.
# To deploy:
#   1. npm install -g wrangler
#   2. wrangler login
#   3. Create a KV namespace:    wrangler kv namespace create KV
#      Copy the returned id into the [[kv_namespaces]] block below.
#   4. Set secrets:
#        wrangler secret put TELEGRAM_BOT_TOKEN
#        wrangler secret put TELEGRAM_WEBHOOK_SECRET    (any long random string)
#        wrangler secret put SHARED_SECRET              (any long random string)
#   5. wrangler deploy
#   6. Register the webhook (one-time):
#        curl -X POST https://YOUR-WORKER.workers.dev/admin/setwebhook \
#          -H "Authorization: Bearer YOUR_SHARED_SECRET" \
#          -H "Content-Type: application/json" \
#          -d '{"worker_url":"https://YOUR-WORKER.workers.dev"}'

name = "secret-messaging-worker"
main = "src/index.js"
compatibility_date = "2026-05-01"

# --- KV namespace ---
# After running `wrangler kv namespace create KV`, paste the id here.
[[kv_namespaces]]
binding = "KV"
id = "PLACEHOLDER_KV_NAMESPACE_ID"
